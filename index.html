<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simon Says</title>
  <link rel="stylesheet" href="normalize.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="gameboard">
    <div class="header">
      <div class="header__level-1">
        <ul class="header__level-1__list">
          <li>easy</li>
          <li>medium</li>
          <li class="selected">hard</li>
        </ul>
        <p class="counter-of-rounds">round <span>1</span>/5</p>
      </div>
      <div class="header__level-2">
        <p class="button-new-game">new game</p>
        <p class="button-repeat-sequence">repeat sequence</p>
      </div>
    </div>
    <div class="main">
      <div class="keyboard-output"></div>
      <div class="keyboard-numbers">
        <div class="row">
          <div class="key">1</div>
          <div class="key">2</div>
          <div class="key">3</div>
          <div class="key">4</div>
          <div class="key">5</div>
          <div class="key">6</div>
          <div class="key">7</div>
          <div class="key">8</div>
          <div class="key">9</div>
          <div class="key">0</div>
        </div>
      </div>
      <div class="keyboard-letters">
        <div class="row">
          <div class="key">Q</div>
          <div class="key">W</div>
          <div class="key">E</div>
          <div class="key">R</div>
          <div class="key">T</div>
          <div class="key">Y</div>
          <div class="key">U</div>
          <div class="key">I</div>
          <div class="key">O</div>
          <div class="key">P</div>
        </div>

        <div class="row">
          <div class="key">A</div>
          <div class="key">S</div>
          <div class="key">D</div>
          <div class="key">F</div>
          <div class="key">G</div>
          <div class="key">H</div>
          <div class="key">J</div>
          <div class="key">K</div>
          <div class="key">L</div>
        </div>

        <div class="row">
          <div class="key">Z</div>
          <div class="key">X</div>
          <div class="key">C</div>
          <div class="key">V</div>
          <div class="key">B</div>
          <div class="key">N</div>
          <div class="key">M</div>
        </div>
      </div>
    </div>
    <div class="button-start">START</div>
  </div>
  <script src="script.js"></script>
</body>
</html>
